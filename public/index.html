<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Number Sense Practice</title>
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <button class="brand-button" type="button" data-action="home" aria-label="Go home">
          <span class="brand-mark">NS</span>
          <span>
            <strong>Number Sense Practice</strong>
            <small>Middle school practice</small>
          </span>
        </button>

        <div class="topbar-actions">
          <button class="ghost-button" type="button" data-action="toggle-theme" aria-label="Toggle dark mode">
            <span data-theme-label>Dark</span>
          </button>
          <button class="ghost-button hidden" type="button" data-action="logout" data-auth-only>
            Log out
          </button>
        </div>
      </header>

      <main id="app" class="app-main"></main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
